name: 나라장터 입찰공고 알림

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 한국시간 오전 9시 (월~금)
    - cron: '0 4 * * 1-5'   # 한국시간 오후 1시 (월~금)
    - cron: '0 8 * * 1-5'   # 한국시간 오후 5시 (월~금)
  workflow_dispatch:
    inputs:
      from_date:
        description: '조회 시작일 (예: 20260601) — 비워두면 최근 2시간'
        required: false
        default: ''
      to_date:
        description: '조회 종료일 (예: 20260602) — 비워두면 시작일과 동일'
        required: false
        default: ''

jobs:
  check-bids:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 필요 패키지 설치
        run: pip install requests

      - name: 입찰공고 확인 및 이메일 발송
        env:
          NARAJANGTER_API_KEY: ${{ secrets.NARAJANGTER_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECV_EMAIL:          ${{ secrets.RECV_EMAIL }}
        run: |
          FROM="${{ github.event.inputs.from_date }}"
          TO="${{ github.event.inputs.to_date }}"

          if [ -n "$FROM" ] && [ -n "$TO" ]; then
            python check_bids.py $FROM $TO
          elif [ -n "$FROM" ]; then
            python check_bids.py $FROM
          else
            python check_bids.py
          fi
